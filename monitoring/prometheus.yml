global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus' # Standardowa ścieżka dla Spring Boot
    static_configs:
      - targets: ['app:8080'] # 'app' to nazwa serwisu z docker-compose.yml

  - job_name: 'docker-containers'
    static_configs:
      - targets: ['cadvisor:8080']