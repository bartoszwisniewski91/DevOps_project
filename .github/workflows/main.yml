name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ github.sha }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub (deploy)
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Deploy with Docker Compose
        run: |
          set -e
          
          # Tworzymy folder, jeśli nie istnieje
          mkdir -p ~/app
          
          # Kopiujemy pliki (nadpisując stare wersje)
          cp docker-compose.yml ~/app/
          if [ -d "monitoring" ]; then
            cp -r monitoring/ ~/app/
          else
            echo "No monitoring folder found"
          fi
          
          cd ~/app
          export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          
          # Używamy docker-compose (z myślnikiem), aby uniknąć błędu "unknown command"
          docker-compose pull
          docker-compose up -d --force-recreate

      - name: Send Discord Notification
        if: always()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"🚀 Deployment status: ${{ job.status }} na Twoim Ubuntu!\"}" \
          "${{ secrets.DISCORD_WEBHOOK }}"